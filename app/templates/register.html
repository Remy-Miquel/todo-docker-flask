{% extends "base.html" %}
{% block title %}Créer un compte — Todo{% endblock %}

{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Créer un compte</h1>

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" name="username" required autofocus maxlength="80">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="field">
      <label for="password">Mot de passe
        <span class="field-hint">8 caractères minimum</span>
      </label>
      <input type="password" id="password" name="password" required minlength="8">
    </div>
    <button type="submit" class="btn-auth">Créer mon compte</button>
  </form>

  <p class="auth-link">Déjà un compte ? <a href="{{ url_for('auth.login') }}">Se connecter</a></p>
</div>
{% endblock %}
